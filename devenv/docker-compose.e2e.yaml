services:
  grafana:
    container_name: "grafana-explore-traces-e2e"
    environment:
      - GF_PLUGINS_PREINSTALL_DISABLED=true
      # Time seeker (grafana/grafana#121650). Requires Grafana 13+ where the toggle is registered.
      - GF_FEATURE_TOGGLES_ENABLE=tracesDrilldownTimeSeeker,localizationForPlugins
    build:
      context: ../.config
      args:
        grafana_image: ${GRAFANA_IMAGE:-grafana}
        grafana_version: ${GRAFANA_VERSION:-12.3.0}
    ports:
      - 3030:3000/tcp
    volumes:
      - ../dist:/var/lib/grafana/plugins/grafana-explore-traces-e2e
      - ../provisioning:/etc/grafana/provisioning
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 40s

  tempo:
    image: grafana/tempo:latest@sha256:009af35797ad7169d264436e3d06e1173afa6c3848bfd8f09d5e914b310a4819
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml
    ports:
      - "3200:3200" # tempo

  # A RabbitMQ queue used to send message between the requester and the server microservices.
  mythical-queue:
    image: rabbitmq:management@sha256:23fe4f224d3d4d4e3c3904e82fb8a47824f0ee03412c33b7b21e6bf00b9852fa
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics check_running
      interval: 5s
      timeout: 30s
      retries: 10

  # A postgres DB used to store data by the API server microservice.
  mythical-database:
    image: postgres:14.5@sha256:135c62a8134dcef829a1e4f5568bfae44bcfa2c75659ff948f43c71964366aa4
    restart: always
    environment:
      POSTGRES_PASSWORD: "mythical"
    ports:
      - "5432:5432"

  # A microservice that makes requests to the API server microservice. Requests are also pushed onto the mythical-queue.
  mythical-requester-A:
    image: grafana/intro-to-mltp:mythical-beasts-requester-0.3.1@sha256:2643fb2e2cd1100e9edecb44d67c82cfa436ea97ff23aeeb646ea063776e539b
    restart: always
    depends_on:
      mythical-queue:
        condition: service_healthy
      mythical-server-A:
        condition: service_started
    environment:
      - MYTHICAL_SERVER_HOST_PORT=mythical-server-A:4000
      - NAMESPACE=production
      - TRACING_COLLECTOR_HOST=tempo
      - TRACING_COLLECTOR_PORT=4317
      - OTEL_EXPORTER_OTLP_TRACES_INSECURE=true
      - OTEL_RESOURCE_ATTRIBUTES=ip=1.2.3.4,region=eu-east

  # The API server microservice.
  mythical-server-A:
    image: grafana/intro-to-mltp:mythical-beasts-server-0.3.1@sha256:d58db9e2bb1c3ffc1a29a7732e2f700bbbeea86a91936c53fc8623e5c39ae648
    restart: always
    depends_on:
      - mythical-database
    environment:
      - NAMESPACE=production
      - TRACING_COLLECTOR_HOST=tempo
      - TRACING_COLLECTOR_PORT=4317
      - OTEL_EXPORTER_OTLP_TRACES_INSECURE=true
      - OTEL_RESOURCE_ATTRIBUTES=ip=1.2.3.5,region=eu-east

  # A microservice that consumes requests from the mythical-queue
  mythical-recorder:
    image: grafana/intro-to-mltp:mythical-beasts-recorder-latest@sha256:82cd1496fd5bdf346bcab547d977e036873a963ea2944292322f54c2d9911b3f
    restart: always
    depends_on:
      mythical-queue:
        condition: service_healthy
    environment:
      - NAMESPACE=production
      - TRACING_COLLECTOR_HOST=tempo
      - TRACING_COLLECTOR_PORT=4317
      - OTEL_EXPORTER_OTLP_TRACES_INSECURE=true
      - OTEL_RESOURCE_ATTRIBUTES=ip=1.2.3.5

  # Used by plugin-ci-workflows: docker compose --profile playwright up playwright --exit-code-from playwright
  playwright:
    profiles:
      - playwright
    image: mcr.microsoft.com/playwright:v1.59.1-noble@sha256:b0ab6f3cb99aa7803adbc14d9027ec1785fc6e433b97e134e0f8fe61683b6b53
    working_dir: /app
    volumes:
      - ..:/app
    environment:
      BASE_URL: http://grafana:3000
      CI: "true"
    depends_on:
      grafana:
        condition: service_healthy
    command: sh -c "corepack enable && pnpm install --frozen-lockfile && sh ./devenv/wait-for-grafana.sh && pnpm e2e:fast"
