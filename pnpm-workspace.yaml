packages:
  - '.'

# Supply-chain hardening (see AGENTS.md). pnpm 11 reads project settings here, not .npmrc / package.json#pnpm.
ignoreScripts: true
minimumReleaseAge: 1440
trustPolicy: no-downgrade
strictDepBuilds: true
blockExoticSubdeps: true

allowBuilds:
  esbuild: true
  rolldown: true
  unrs-resolver: true

overrides:
  '@types/node': 24.10.1
  chokidar: ^5.0.0
  react-redux: ^9.3.0
  semver: ^7.7.4
  ua-parser-js: ^2.0.10
  lodash: ^4.18.0
  react-router: ^6.30.2
  serialize-javascript: ^7.0.5
  immutable: ^5.1.5
  dompurify: ^3.4.0
  yaml: ^2.8.3
  minimatch@^3: ~3.1.4
  minimatch@^9: ~10.2.0
  minimatch@^10: ^10.2.3
  uuid: ^14.0.0
  '@tootallnate/once': '>=3.0.1'
  js-cookie: ^3.0.7
  protobufjs: ^7.5.8
  ws: ^8.20.1
  qs: ^6.15.2
