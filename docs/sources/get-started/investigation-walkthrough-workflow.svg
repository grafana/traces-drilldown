<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 230" width="100%" style="max-width: 540px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6E6D7A"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="540" height="230" fill="#FAFBFC" rx="8"/>

  <!-- Title -->
  <text x="270" y="28" text-anchor="middle" font-size="16" font-weight="600" fill="#1F1F23">Investigation walkthrough</text>
  <text x="270" y="44" text-anchor="middle" font-size="11" fill="#6E6D7A">Error investigation workflow in Traces Drilldown</text>

  <!-- Row 1 -->

  <!-- Step 1: Open Traces Drilldown -->
  <g filter="url(#shadow)">
    <rect x="20" y="68" width="155" height="50" rx="6" fill="#ffffff" stroke="#3D71D9" stroke-width="1.5"/>
    <text x="30" y="88" font-size="10">
      <tspan font-weight="700" fill="#3D71D9">1.</tspan>
      <tspan font-weight="600" fill="#1F1F23"> Open Traces Drilldown</tspan>
    </text>
    <text x="30" y="104" font-size="9" fill="#6E6D7A">Drilldown &gt; Traces</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="175" y1="93" x2="191" y2="93" stroke="#6E6D7A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: Choose span data -->
  <g filter="url(#shadow)">
    <rect x="193" y="68" width="155" height="50" rx="6" fill="#ffffff" stroke="#6C5CE7" stroke-width="1.5"/>
    <text x="203" y="88" font-size="10">
      <tspan font-weight="700" fill="#6C5CE7">2.</tspan>
      <tspan font-weight="600" fill="#1F1F23"> Choose span data</tspan>
    </text>
    <text x="203" y="104" font-size="9" fill="#6E6D7A">Root spans or All spans</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="348" y1="93" x2="364" y2="93" stroke="#6E6D7A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: Select Errors metric -->
  <g filter="url(#shadow)">
    <rect x="366" y="68" width="155" height="50" rx="6" fill="#ffffff" stroke="#E53935" stroke-width="1.5"/>
    <text x="376" y="88" font-size="10">
      <tspan font-weight="700" fill="#E53935">3.</tspan>
      <tspan font-weight="600" fill="#1F1F23"> Select Errors metric</tspan>
    </text>
    <text x="376" y="104" font-size="9" fill="#6E6D7A">Focus on failed requests</text>
  </g>

  <!-- Connector 3→4 (rounded Z-path) -->
  <path d="M 443,118 L 443,132 Q 443,139 436,139 L 104,139 Q 97,139 97,146 L 97,160" fill="none" stroke="#6E6D7A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Row 2 -->

  <!-- Step 4: View errored traces -->
  <g filter="url(#shadow)">
    <rect x="20" y="160" width="155" height="50" rx="6" fill="#ffffff" stroke="#F5A623" stroke-width="1.5"/>
    <text x="30" y="180" font-size="10">
      <tspan font-weight="700" fill="#F5A623">4.</tspan>
      <tspan font-weight="600" fill="#1F1F23"> View errored traces</tspan>
    </text>
    <text x="30" y="196" font-size="9" fill="#6E6D7A">Error traces in table view</text>
  </g>

  <!-- Arrow 4→5 -->
  <line x1="175" y1="185" x2="191" y2="185" stroke="#6E6D7A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 5: Examine a trace -->
  <g filter="url(#shadow)">
    <rect x="193" y="160" width="155" height="50" rx="6" fill="#ffffff" stroke="#43A047" stroke-width="1.5"/>
    <text x="203" y="180" font-size="10">
      <tspan font-weight="700" fill="#43A047">5.</tspan>
      <tspan font-weight="600" fill="#1F1F23"> Examine a trace</tspan>
    </text>
    <text x="203" y="196" font-size="9" fill="#6E6D7A">Open to view span details</text>
  </g>

  <!-- Arrow 5→6 -->
  <line x1="348" y1="185" x2="364" y2="185" stroke="#6E6D7A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 6: Explore breakdown -->
  <g filter="url(#shadow)">
    <rect x="366" y="160" width="155" height="50" rx="6" fill="#ffffff" stroke="#00897B" stroke-width="1.5"/>
    <text x="376" y="180" font-size="10">
      <tspan font-weight="700" fill="#00897B">6.</tspan>
      <tspan font-weight="600" fill="#1F1F23"> Explore breakdown</tspan>
    </text>
    <text x="376" y="196" font-size="9" fill="#6E6D7A">Error patterns by attribute</text>
  </g>
</svg>
